name: Generate Minecraft Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/minecraft-contribution.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Minecraft contribution SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
          OUT_PATH: assets/minecraft-contribution.svg
        shell: python {0}
        run: |
          #!/usr/bin/env python3
          """Generate a Minecraft-themed contribution SVG using REAL GitHub data.

          Designed to run inside a GitHub Action. Reads:
            GITHUB_TOKEN   — auto-provided by Actions
            GH_USERNAME    — set in workflow env
            OUT_PATH       — output file path (default: ./minecraft-contribution.svg)

          Fetches the user's contribution calendar via GitHub's GraphQL API, maps daily
          commit counts to Minecraft block types, and writes a self-contained animated
          SVG with Steve walking across mining the blocks.
          """
          import os
          import sys
          import json
          import urllib.request
          import random
          import urllib.error
          from datetime import datetime
          from pathlib import Path

          # ---------- Layout (matches GitHub contribution graph exactly) ----------
          COLS = 53
          ROWS = 7
          CELL = 10
          GAP = 3
          PITCH = CELL + GAP            # 13
          GRID_W = COLS * PITCH - GAP   # 686
          GRID_H = ROWS * PITCH - GAP   # 88

          # Tight canvas — grid dominates, minimal padding (matches GitHub layout)
          GRID_LEFT = 30                # left margin (room for day labels)
          GRID_TOP = 36                 # top margin (room for month labels + Steve)
          RIGHT_PAD = 30
          BOTTOM_PAD = 14
          WIDTH = GRID_LEFT + GRID_W + RIGHT_PAD       # 746
          HEIGHT = GRID_TOP + GRID_H + BOTTOM_PAD      # 138

          # ---------- Animation timing ----------
          WALK_DUR = 42.0
          TOTAL_DUR = WALK_DUR  # no dead zone — loop wraps instantly when Steve exits
          START_X = -25
          END_X = WIDTH + 5
          STEVE_Y = GRID_TOP - 26

          # ---------- GraphQL ----------
          GRAPHQL_QUERY = """
          query($username: String!) {
            user(login: $username) {
              contributionsCollection {
                contributionCalendar {
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                    }
                  }
                }
              }
            }
          }
          """

          def fetch_contributions(username: str, token: str):
              """Return a 53x7 grid of (count, date) tuples from GitHub's GraphQL API."""
              payload = json.dumps({
                  "query": GRAPHQL_QUERY,
                  "variables": {"username": username},
              }).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "minecraft-contribution-action",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())

              if "errors" in data:
                  raise RuntimeError(f"GraphQL errors: {data['errors']}")
              weeks = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["weeks"]
              # Build a (col, row) -> count, date map. Grid columns = weeks, rows = day-of-week.
              grid = {}
              for c, week in enumerate(weeks):
                  for day in week["contributionDays"]:
                      d = datetime.strptime(day["date"], "%Y-%m-%d").date()
                      r = (d.weekday() + 1) % 7  # GitHub puts Sunday on top (row 0)
                      grid[(c, r)] = (day["contributionCount"], day["date"])
              return grid

          def block_for_count(count):
              """Map a daily commit count to a Minecraft block type.

              GitHub itself uses 5 levels: 0 / 1-3 / 4-6 / 7-9 / 10+. We follow that, but
              add a 6th tier — 'ore' — for very heavy days, because diamond > diamond.
              """
              if count == 0:  return None        # empty cell (GitHub light gray)
              if count < 4:   return "grass1"
              if count < 7:   return "grass2"
              if count < 12:  return "grass3"
              if count < 20:  return "iron"
              if count < 30:  return "gold"
              return "diamond"

          # ---------- SVG patterns (10x10, GitHub-cell-sized) ----------
          DEFS = """
          <defs>
            <pattern id="grass1" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#3a6b2a"/>
              <rect x="0" y="0" width="10" height="2" fill="#4d8a3a"/>
              <rect x="0" y="2" width="10" height="1" fill="#2e5621"/>
              <rect x="3" y="6" width="1" height="1" fill="#4d8a3a"/>
              <rect x="7" y="7" width="1" height="1" fill="#2e5621"/>
            </pattern>
            <pattern id="grass2" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#5DAB3F"/>
              <rect x="0" y="0" width="10" height="2" fill="#7BC85A"/>
              <rect x="0" y="2" width="10" height="1" fill="#3F7026"/>
              <rect x="2" y="5" width="1" height="1" fill="#7BC85A"/>
              <rect x="7" y="7" width="1" height="1" fill="#3F7026"/>
            </pattern>
            <pattern id="grass3" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#7AC34F"/>
              <rect x="0" y="0" width="10" height="2" fill="#9BD96B"/>
              <rect x="0" y="2" width="10" height="1" fill="#5A9C36"/>
              <rect x="3" y="6" width="1" height="1" fill="#9BD96B"/>
              <rect x="7" y="7" width="1" height="1" fill="#5A9C36"/>
            </pattern>
            <pattern id="iron" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#6D6D6D"/>
              <rect x="2" y="2" width="2" height="2" fill="#B8896A"/>
              <rect x="2" y="2" width="1" height="1" fill="#D4A88A"/>
              <rect x="6" y="6" width="2" height="2" fill="#B8896A"/>
            </pattern>
            <pattern id="gold" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#6D6D6D"/>
              <rect x="2" y="2" width="2" height="2" fill="#D4A82A"/>
              <rect x="2" y="2" width="1" height="1" fill="#F0C84A"/>
              <rect x="6" y="6" width="2" height="2" fill="#D4A82A"/>
            </pattern>
            <pattern id="diamond" width="10" height="10" patternUnits="userSpaceOnUse">
              <rect width="10" height="10" fill="#6D6D6D"/>
              <rect x="2" y="2" width="2" height="2" fill="#4FBED1"/>
              <rect x="2" y="2" width="1" height="1" fill="#8FE0EE"/>
              <rect x="6" y="6" width="2" height="2" fill="#4FBED1"/>
            </pattern>
          </defs>
          """

          # Empty-cell fill — neutral gray with low opacity, readable on light AND dark themes
          # (GitHub uses #ebedf0 on light, #161b22 on dark; this is a compromise that blends with both)
          EMPTY_FILL = "#7d7d7d"
          EMPTY_OPACITY = "0.18"

          PATTERN_FOR = {k: f"url(#{k})" for k in
                         ["grass1", "grass2", "grass3", "iron", "gold", "diamond"]}

          def build_svg(grid):
              """grid is a dict (col, row) -> (count, date).

              Animation: Steve walks INTO the grid, then teleports between filled cells
              in a (deterministically shuffled) random order, mining each one in turn.
              Block N visibly cracks and disappears during Steve's brief stay at it.
              """
              # ---------- Animation timing ----------
              TIME_ENTRY = 1.0      # Steve walks in from off-left
              DWELL = 0.35          # how long Steve visibly dwells at each block
              HOP = 0.35            # smooth slide to next cell (slowed for visible walking)
              TIME_EXIT = 1.0
              FADE = 0.25           # block fades during this much of the dwell

              # ---------- Collect filled cells in ROW-MAJOR order ----------
              # Steve mines one row at a time, sweeping left→right across the row,
              # then drops down to the next row. (Rows = day-of-week in GitHub's calendar.)
              filled = []
              for r in range(ROWS):
                  for c in range(COLS):
                      count, date = grid.get((c, r), (0, ""))
                      if count > 0:
                          filled.append((c, r, count, date))

              N = len(filled)

              # ---------- Position Steve next to / over each cell ----------
              # Pickaxe pivot is at local (14, 12); pickaxe head sweeps near local x=14..16.
              # For Steve standing immediately LEFT of a block with pickaxe over the block:
              #   steve.x = block_left - 17   (his pickaxe arm reaches into the block)
              # For Steve at the block's row vertically (body center aligned with block center):
              #   steve.y = block_top + CELL/2 - 11  (his body height-center is local y=11)
              def steve_pos_for_cell(c, r):
                  bx = GRID_LEFT + c * PITCH
                  by = GRID_TOP  + r * PITCH
                  return (bx - 17, by + CELL // 2 - 11)

              OFF_LEFT  = (-30, GRID_TOP + 3 * PITCH - 11)   # off-screen at middle row height
              OFF_RIGHT = (WIDTH + 20, GRID_TOP + 3 * PITCH - 11)

              # ---------- Build Steve's movement path ----------
              if N == 0:
                  # No contributions to mine — just have Steve cross the grid once
                  TOTAL_DUR = 4.0
                  path_values = [OFF_LEFT, OFF_RIGHT]
                  path_times = [0.0, 1.0]
              else:
                  # values: off_left → (pos_i, pos_i for each i, repeated for dwell) → off_right
                  TOTAL_DUR = TIME_ENTRY + (N - 1) * HOP + N * DWELL + TIME_EXIT

                  path_values = [OFF_LEFT]
                  path_times = [0.0]
                  for i, (c, r, _count, _date) in enumerate(filled):
                      arrive_t = TIME_ENTRY + i * (DWELL + HOP)
                      depart_t = arrive_t + DWELL
                      xy = steve_pos_for_cell(c, r)
                      path_values.append(xy);  path_times.append(arrive_t)
                      path_values.append(xy);  path_times.append(depart_t)
                  path_values.append(OFF_RIGHT)
                  path_times.append(TOTAL_DUR)
                  # Normalize and ensure first/last are exactly 0/1
                  path_times = [t / TOTAL_DUR for t in path_times]
                  path_times[0] = 0.0
                  path_times[-1] = 1.0

              walk_values_str = "; ".join(f"{x},{y}" for (x, y) in path_values)
              walk_keytimes_str = ";".join(f"{k:.4f}" for k in path_times)

              # ---------- Build the cell rectangles ----------
              blocks = []

              # Layer 1: ALL cells get a faint gray fill (works on light AND dark themes)
              for c in range(COLS):
                  for r in range(ROWS):
                      x = GRID_LEFT + c * PITCH
                      y = GRID_TOP + r * PITCH
                      blocks.append(
                          f'<rect x="{x}" y="{y}" width="{CELL}" height="{CELL}" '
                          f'rx="2" fill="{EMPTY_FILL}" opacity="{EMPTY_OPACITY}"/>'
                      )

              # Layer 2: filled blocks. Each block fades during its visit slot.
              for visit_i, (c, r, count, _date) in enumerate(filled):
                  x = GRID_LEFT + c * PITCH
                  y = GRID_TOP + r * PITCH
                  t = block_for_count(count)
                  arrive_t = TIME_ENTRY + visit_i * (DWELL + HOP)
                  # Fade window: small delay so user sees Steve land, then block cracks & vanishes
                  fade_start = arrive_t + 0.04
                  fade_mid   = fade_start + FADE * 0.45
                  fade_end   = arrive_t + DWELL - 0.02   # done just before Steve hops away
                  k0 = fade_start / TOTAL_DUR
                  k1 = fade_mid   / TOTAL_DUR
                  k2 = fade_end   / TOTAL_DUR
                  blocks.append(
                      f'<rect x="{x}" y="{y}" width="{CELL}" height="{CELL}" rx="2" '
                      f'fill="{PATTERN_FOR[t]}">'
                      f'<animate attributeName="opacity" values="1;1;0.45;0;0" '
                      f'keyTimes="0;{k0:.4f};{k1:.4f};{k2:.4f};1" '
                      f'dur="{TOTAL_DUR}s" repeatCount="indefinite"/>'
                      f'</rect>'
                  )

              cells_svg = '<g id="grid">' + "".join(blocks) + "</g>"

              # ---------- Sky background (drawn behind grid) ----------
              # Soft Minecraft-style daytime gradient
              sky = (
                  '<defs>'
                  '<linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">'
                  '<stop offset="0%" stop-color="#87CEEB"/>'      # light sky blue at top
                  '<stop offset="100%" stop-color="#C8E6F5"/>'    # almost white at horizon
                  '</linearGradient>'
                  '</defs>'
                  f'<rect x="0" y="0" width="{WIDTH}" height="{GRID_TOP + GRID_H + 2}" '
                  f'fill="url(#skyGrad)"/>'
              )

              # Pixel-art sun (top-right corner)
              sun_x, sun_y = WIDTH - 28, 6
              sun = (
                  f'<g id="sun">'
                  f'<rect x="{sun_x+4}" y="{sun_y}" width="12" height="2" fill="#FFE680"/>'
                  f'<rect x="{sun_x+2}" y="{sun_y+2}" width="16" height="2" fill="#FFE680"/>'
                  f'<rect x="{sun_x}" y="{sun_y+4}" width="20" height="12" fill="#FFE680"/>'
                  f'<rect x="{sun_x+2}" y="{sun_y+16}" width="16" height="2" fill="#FFE680"/>'
                  f'<rect x="{sun_x+4}" y="{sun_y+18}" width="12" height="2" fill="#FFE680"/>'
                  # inner highlight
                  f'<rect x="{sun_x+4}" y="{sun_y+4}" width="12" height="12" fill="#FFF4B0"/>'
                  f'<rect x="{sun_x+6}" y="{sun_y+6}" width="8" height="8" fill="#FFFFE0"/>'
                  f'</g>'
              )

              # Pixel-art clouds (white blocky shapes drifting slowly across the sky).
              # Clouds are drawn as compositions of small rectangles, then translated
              # across the full width with a long-period animateTransform.
              def cloud_shape(scale=1):
                  s = scale
                  return (
                      f'<rect x="0" y="{2*s}" width="{6*s}" height="{2*s}" fill="#FFFFFF"/>'
                      f'<rect x="{2*s}" y="0" width="{8*s}" height="{2*s}" fill="#FFFFFF"/>'
                      f'<rect x="0" y="{4*s}" width="{14*s}" height="{2*s}" fill="#FFFFFF"/>'
                      f'<rect x="{4*s}" y="{6*s}" width="{8*s}" height="{2*s}" fill="#FFFFFF"/>'
                      # slight shading at the bottom for depth
                      f'<rect x="{2*s}" y="{6*s}" width="{2*s}" height="{2*s}" fill="#E6E6F0"/>'
                      f'<rect x="{12*s}" y="{4*s}" width="{2*s}" height="{2*s}" fill="#E6E6F0"/>'
                  )

              # Three clouds at different heights and speeds, all drifting left→right
              clouds = (
                  f'<g id="cloud1" opacity="0.85"><g>{cloud_shape(1)}'
                  f'<animateTransform attributeName="transform" type="translate" '
                  f'values="-20,0; {WIDTH+30},0" dur="60s" repeatCount="indefinite"/>'
                  f'</g><animateTransform attributeName="transform" type="translate" '
                  f'from="0,4" to="0,4" dur="1s"/></g>'
                  f'<g id="cloud2" opacity="0.75"><g>{cloud_shape(1)}'
                  f'<animateTransform attributeName="transform" type="translate" '
                  f'values="-30,0; {WIDTH+30},0" dur="80s" begin="-25s" repeatCount="indefinite"/>'
                  f'</g><animateTransform attributeName="transform" type="translate" '
                  f'from="0,16" to="0,16" dur="1s"/></g>'
                  f'<g id="cloud3" opacity="0.9"><g>{cloud_shape(1)}'
                  f'<animateTransform attributeName="transform" type="translate" '
                  f'values="-20,0; {WIDTH+30},0" dur="100s" begin="-50s" repeatCount="indefinite"/>'
                  f'</g><animateTransform attributeName="transform" type="translate" '
                  f'from="0,10" to="0,10" dur="1s"/></g>'
              )

              # ---------- Ground line under the grid ----------
              ground_y = GRID_TOP + GRID_H + 2
              ground = (
                  f'<g><rect x="0" y="{ground_y}" width="{WIDTH}" height="3" fill="#5C3E1F"/>'
                  f'<rect x="0" y="{ground_y+3}" width="{WIDTH}" height="1" fill="#3D2817"/></g>'
              )

              # ---------- Steve sprite ----------
              # Note: outer translate animation uses calcMode="linear" with the path/keyTimes
              # built above. Repeated values create dwell phases at each cell.
              steve = f'''<g id="steve"><g><g>
          <rect x="2" y="0" width="9" height="2" fill="#2D1B0E"/>
          <rect x="1" y="2" width="11" height="1" fill="#2D1B0E"/>
          <rect x="1" y="3" width="11" height="6" fill="#E8B080"/>
          <rect x="3" y="5" width="2" height="2" fill="#FFFFFF"/>
          <rect x="4" y="5" width="1" height="2" fill="#3060B0"/>
          <rect x="8" y="5" width="2" height="2" fill="#FFFFFF"/>
          <rect x="9" y="5" width="1" height="2" fill="#3060B0"/>
          <rect x="4" y="8" width="5" height="1" fill="#7B4F2C"/>
          <rect x="1" y="9" width="11" height="7" fill="#2C9DAF"/>
          <rect x="1" y="9" width="11" height="1" fill="#1F7888"/>
          <rect x="1" y="16" width="11" height="1" fill="#3A2810"/>
          <rect x="1" y="17" width="4" height="5" fill="#2D2570"/>
          <rect x="8" y="17" width="4" height="5" fill="#2D2570"/>
          <rect x="-1" y="9" width="2" height="7" fill="#E8B080"/>
          <rect x="-1" y="9" width="2" height="1" fill="#1F7888"/>
          <g><rect x="12" y="9" width="2" height="7" fill="#E8B080"/>
          <rect x="12" y="9" width="2" height="1" fill="#1F7888"/>
          <g transform="translate(14,12)"><g>
          <rect x="0" y="-1" width="1" height="9" fill="#7B4F2C"/>
          <rect x="-2" y="-2" width="5" height="2" fill="#B8B8B8"/>
          <rect x="-2" y="-2" width="5" height="1" fill="#D8D8D8"/>
          <animateTransform attributeName="transform" type="rotate"
            values="-35; 25; -35" dur="0.75s" repeatCount="indefinite"/>
          </g></g></g>
          <animateTransform attributeName="transform" type="translate"
            values="0,0; 0,-1; 0,0" dur="0.75s" repeatCount="indefinite"/>
          </g></g>
          <animateTransform attributeName="transform" type="translate"
            values="{walk_values_str}"
            keyTimes="{walk_keytimes_str}"
            dur="{TOTAL_DUR}s" repeatCount="indefinite"/></g>'''

              return (
                  f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {WIDTH} {HEIGHT}" '
                  f'width="{WIDTH}" height="{HEIGHT}" role="img" '
                  f'aria-label="Minecraft contribution graph">'
                  f'<title>Minecraft contribution graph</title>'
                  f'{DEFS}{sky}{sun}{clouds}{cells_svg}{ground}{steve}</svg>'
              )


          def main():
              out_path = os.environ.get("OUT_PATH", "minecraft-contribution.svg")
              out_dir = os.path.dirname(out_path)
              if out_dir:
                  os.makedirs(out_dir, exist_ok=True)
              username = os.environ.get("GH_USERNAME")
              token = os.environ.get("GITHUB_TOKEN")
              if not username or not token:
                  print("ERROR: GH_USERNAME and GITHUB_TOKEN must be set", file=sys.stderr)
                  sys.exit(1)

              print(f"Fetching contributions for {username}...")
              grid = fetch_contributions(username, token)
              filled = sum(1 for v in grid.values() if v[0] > 0)
              total = sum(v[0] for v in grid.values())
              print(f"  {filled}/{len(grid)} active days, {total} total contributions")

              svg = build_svg(grid)
              Path(out_path).write_text(svg)
              print(f"Wrote {out_path} ({len(svg):,} bytes)")

          if __name__ == "__main__":
              main()


      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/minecraft-contribution.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update minecraft contribution graph [skip ci]"
            git push
          fi
